modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="${mod_logo_file}"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config="fightura.mixins.json"

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="epicfight"
mandatory=true
versionRange="[20.14.15,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="figura"
mandatory=true
versionRange="[0.1.5,)"
ordering="AFTER"
side="CLIENT"
